services:
  frontend:
    build:
      context: ./Front_REACT
      dockerfile: Dockerfile
    image: dcmendozar/front_react:latest
    container_name: front_react
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dcmendozar/backend:latest
    container_name: backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=1234
      - DB_DATABASE=NextLevelBL
      - DB_PORT=3306
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: NextLevelBL
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
