<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Restaurante Gourmet</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <img src="imagenes/logo.png" alt="Logo del Restaurante">
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="reservas.html">Reservas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="login.html">Iniciar Sesión</a></li>
                <li><a href="signup.html">Crear Cuenta</a></li>
            </ul>
            <div class="carrito">
                <a href="carrito.html"> <!-- Enlace que redirige al carrito de compras -->
                    <img src="imagenes/icono-carrito.png" alt="Carrito de Compras">
                    <span class="contador-carrito">0</span>
                </a>
            </div>
        </nav>
    </header>

    <!-- Sección de Registro -->
    <section class="signup">
        <h2>Crear Cuenta</h2>
        <form id="signup-form">
            <label for="newUsername">Usuario:</label>
            <input type="text" id="newUsername" name="newUsername" required>
            <label for="newEmail">Correo Electrónico:</label>
            <input type="email" id="newEmail" name="newEmail" required>
            <label for="newPassword">Contraseña:</label>
            <input type="password" id="newPassword" name="newPassword" required>
            <button type="submit">Crear Cuenta</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 Restaurante Gourmet. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
