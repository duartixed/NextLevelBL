<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="../src/assets/css/style.css">
    <script defer src="./assets/js/carrito.js"></script>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="./assets/imagenes/logo.png" alt="Logo">
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="reservas.html">Reservas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="login.html">Iniciar Sesión</a></li>
                <li><a href="signup.html">Crear Cuenta</a></li>
            </ul>
        </nav>
        <div class="carrito">
            <a href="carrito.html">
                <img src="./assets/imagenes/icono-carrito.png" alt="Carrito">
                <span class="contador-carrito">0</span>
            </a>
        </div>
    </header>

    <!-- Sección Carrito -->
    <div class="carrito-contenido">
        <h1>Tu Carrito de Compras</h1>
        <div id="lista-carrito"></div>
        
        <!-- Total -->
        <div class="total">
            <p>Total: <span id="total-precio">$0.00</span></p>
            <button id="btn-vaciar" type="button">Vaciar Carrito</button>
            <button type="button">Proceder al Pago</button>
            
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Restaurante Gourmet. Todos los derechos reservados.</p>
    </footer>

   
</body>
</html>
