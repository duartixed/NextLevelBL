<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="./assets/css/style.css"> <!-- Asegúrate de que la ruta del CSS sea correcta -->
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="reservas.html">Reservas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="login.html">Iniciar Sesión</a></li>
                <li><a href="signup.html">Crear Cuenta</a></li> <!-- Asegúrate de que este enlace esté presente -->
            </ul>
        </nav>
        <div class="carrito">
            <img src="./assets/imagenes/icono-carrito.png" alt="Carrito">
            <div class="contador-carrito">2</div>
        </div>
    </header>

    <!-- Sección Carrito -->
    <div class="carrito-contenido">
        <h1>Tu Carrito de Compras</h1>

        <!-- Producto 1 -->
        <div class="producto">
            <img src="producto1.jpg" alt="Producto 1">
            <div>
                <h3>Producto 1</h3>
                <p>Precio: $10.00</p>
            </div>
            <button>Eliminar</button>
        </div>

        <!-- Producto 2 -->
        <div class="producto">
            <img src="producto2.jpg" alt="Producto 2">
            <div>
                <h3>Producto 2</h3>
                <p>Precio: $15.00</p>
            </div>
            <button>Eliminar</button>
        </div>

        <!-- Total -->
        <div class="total">
            <p>Total: $25.00</p>
            <button>Proceder al Pago</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; © 2024 Restaurante Gourmet. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
