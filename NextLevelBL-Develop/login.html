<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Restaurante Gourmet</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="./assets/imagenes/logo.png" alt="Logo del Restaurante">
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="reservas.html">Reservas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="login.html">Iniciar Sesión</a></li>
                <li><a href="signup.html">Crear Cuenta</a></li> <!-- Asegúrate de que este enlace esté presente -->
            </ul>
            <div class="carrito">
                <a href="carrito.html"> <!-- Enlace que redirige al carrito de compras -->
                    <img src="./assets/imagenes/icono-carrito.png" alt="Carrito de Compras">
                    <span class="contador-carrito">0</span>
                </a>
            </div>
        </nav>
    </header>

    <section class="login">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Iniciar Sesión</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2024 Restaurante Gourmet. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
