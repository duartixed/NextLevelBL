name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Instalar dependencias raíz
        run: |
          npm install --legacy-peer-deps || true
      - name: Lint raíz
        run: |
          npx eslint .
      - name: Instalar dependencias backend
        run: |
          cd backend && npm install --legacy-peer-deps || true
      - name: Lint backend
        run: |
          cd backend && npx eslint . -c .eslintrc.json
      - name: Instalar dependencias Front_REACT
        run: |
          cd Front_REACT && npm install --legacy-peer-deps || true
      - name: Lint Front_REACT
        run: |
          cd Front_REACT && npx eslint .
      - name: Test backend
        run: |
          cd backend && npm test || echo "No tests"
      - name: Test Front_REACT
        run: |
          cd Front_REACT && npm test || echo "No tests"
      - name: Build Front_REACT
        run: |
          cd Front_REACT && npm run build
